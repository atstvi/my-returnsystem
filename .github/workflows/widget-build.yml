name: Build Widget (Windows)

# Builds the Tauri PC desktop widget into a Windows .msi installer on a cloud
# Windows runner, so a non-technical user just downloads + double-clicks the
# installer instead of installing Rust/MSVC/Node locally. A green run also
# proves the widget actually compiles + bundles on Windows.

on:
  workflow_dispatch: {}        # 수동 컴파일 체크용(Actions 탭에서 실행). updater 도입 후
                               # push 자동 트리거는 제거 — 서명 아티팩트 설정과 얽히지 않게.

jobs:
  build-msi:
    name: build windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            widget/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('widget/src-tauri/Cargo.toml') }}

      - name: Install widget deps (Tauri CLI)
        working-directory: widget
        run: npm install

      # 컴파일/번들 검증용. createUpdaterArtifacts 를 꺼서 서명키(시크릿) 없이도 통과.
      # (서명된 .msi + latest.json 은 widget-release.yml 에서만 만든다.)
      - name: Build .msi (compile check, updater artifacts off)
        working-directory: widget
        shell: pwsh
        run: |
          Set-Content -Path check.conf.json -Value '{"bundle":{"createUpdaterArtifacts":false}}' -Encoding ascii
          npx tauri build --config "$((Get-Location).Path)\check.conf.json"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: return-widget-windows-msi
          path: widget/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
