name: Release Widget (.msi)

# Tauri PC 위젯을 Windows .msi 로 빌드 + 서명하고, GitHub Release 에 .msi / .msi.sig /
# latest.json 을 올린다. latest.json 은 위젯 자동 업데이트(updater)의 매니페스트다.
#
# ⚠️ 먼저 한 번만: widget/UPDATER-SETUP.md 대로 서명키를 만들고
#   - tauri.conf.json 의 pubkey 를 공개키로 교체(커밋)
#   - 저장소 Secrets 에 TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD 등록
# 이 안 되어 있으면 서명 단계에서 빌드가 실패한다.
#
# Trigger: `widget-v*` 태그 push, 또는 Actions 탭에서 수동 실행(tag 입력).

on:
  push:
    tags:
      - 'widget-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to create + release (e.g. widget-v0.9.7)'
        required: true

permissions:
  contents: write

jobs:
  release-msi:
    name: build + sign + publish windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            widget/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('widget/src-tauri/Cargo.toml') }}

      # 태그(widget-v0.9.7)에서 버전(0.9.7)을 뽑아 tauri.conf.json 에 써넣는다.
      # 그래야 빌드된 앱 버전 + latest.json 버전이 태그와 일치해 업데이트 비교가 맞다.
      - name: Resolve tag + write version into tauri.conf.json
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $ver = $tag -replace '^widget-v',''
          "tag=$tag"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$ver"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $conf = "widget/src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version = $ver
          $json | ConvertTo-Json -Depth 100 | Set-Content $conf -Encoding utf8
          Write-Host "built version = $ver"

      - name: Install widget deps
        working-directory: widget
        run: npm install

      # tauri-action 이 빌드 + 서명 + Release 생성 + .msi/.msi.sig/latest.json 업로드까지 처리.
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: widget
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: Return Widget ${{ steps.ver.outputs.tag }}
          releaseDraft: false
          prerelease: false
