name = "return-push"
main = "push-worker.js"
compatibility_date = "2024-11-01"

# 매 분 실행되어 마감된 리마인더를 Web Push로 발송
[triggers]
crons = ["* * * * *"]

# KV: 기기별 구독 + 리마인더 저장. 아래 id는 `wrangler kv namespace create PUSH_KV` 로
# 생성한 뒤 나오는 값으로 바꾸세요.
[[kv_namespaces]]
binding = "PUSH_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# 시크릿(코드에 넣지 말 것): 아래 명령으로 등록
#   wrangler secret put VAPID_PUBLIC
#   wrangler secret put VAPID_PRIVATE
#   wrangler secret put VAPID_SUBJECT     (예: mailto:you@example.com)
