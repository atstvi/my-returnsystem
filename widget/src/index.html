<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Return Widget</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Fix for Firebase signInWithRedirect in Tauri/WebView2:
    // WebView2 clears sessionStorage on cross-origin navigation round-trips,
    // so Firebase's pending-redirect marker (written to sessionStorage just before
    // the OAuth redirect) is gone by the time the app loads again after auth.
    // getRedirectResult() then finds no pending redirect → onAuthStateChanged
    // fires with null user → the login screen re-appears even though auth succeeded.
    //
    // Fix: proxy sessionStorage.setItem so every write is also mirrored to
    // localStorage (which survives cross-origin navigation). On each page load,
    // restore the mirror into sessionStorage BEFORE the Firebase SDK loads so
    // getRedirectResult() sees the pending marker and completes normally.
    (function () {
      // Step 1 — restore backup from previous navigation (if any).
      try {
        var _b = localStorage.getItem("__w_ss");
        if (_b) {
          var _d = JSON.parse(_b);
          for (var _k in _d) {
            if (Object.prototype.hasOwnProperty.call(_d, _k)) {
              try { sessionStorage.setItem(_k, _d[_k]); } catch (_) {}
            }
          }
        }
      } catch (_) {}

      // Step 2 — proxy sessionStorage so future writes stay backed up.
      // Firebase writes the pending-redirect marker here just before navigation.
      try {
        var _ss = window.sessionStorage;
        var _oSet = _ss.setItem.bind(_ss);
        var _oDel = _ss.removeItem.bind(_ss);
        var _oClear = _ss.clear.bind(_ss);
        function _snap() {
          try {
            var s = {};
            for (var i = 0; i < _ss.length; i++) { var k = _ss.key(i); s[k] = _ss.getItem(k); }
            localStorage.setItem("__w_ss", JSON.stringify(s));
          } catch (_) {}
        }
        _ss.setItem    = function (k, v) { _oSet(k, v); _snap(); };
        _ss.removeItem = function (k)    { _oDel(k);    _snap(); };
        _ss.clear      = function ()     { _oClear(); localStorage.removeItem("__w_ss"); };
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <!-- The whole card is the widget surface. The top bar is the drag handle. -->
  <div class="widget-card">
    <!-- data-tauri-drag-region makes this strip move the window (frameless). -->
    <header class="widget-bar" data-tauri-drag-region>
      <span class="widget-title" data-tauri-drag-region>↩ Return</span>
      <div class="widget-controls">
        <button class="wbtn" id="pin-btn" type="button" title="항상 위에 고정">📌</button>
        <button class="wbtn" id="min-btn" type="button" title="최소화">—</button>
        <button class="wbtn wbtn-close" id="close-btn" type="button" title="트레이로 숨기기 (완전 종료는 트레이 아이콘 우클릭)">×</button>
      </div>
    </header>

    <main class="widget-body">

      <!-- Loading splash -->
      <div id="view-loading" class="view view-center">
        <div class="w-spinner"></div>
        <div class="w-spinner-label">불러오는 중…</div>
      </div>

      <!-- Sign-in prompt -->
      <div id="view-auth" class="view view-center" style="display:none">
        <div class="w-logo">↩</div>
        <div class="w-auth-title">Return 위젯</div>
        <div class="w-auth-sub">Google 계정으로 로그인하면<br>오늘의 루틴을 볼 수 있어요.</div>
        <button class="w-sign-btn" id="sign-in-btn" type="button">Google로 로그인</button>
        <div class="w-auth-err" id="auth-err"></div>
      </div>

      <!-- Habit list (main view) -->
      <div id="view-habits" class="view view-col" style="display:none">
        <div class="w-date-row">
          <span id="today-label" class="w-date-label"></span>
          <span class="w-sync-dot" id="sync-dot"></span>
        </div>
        <div id="habit-list" class="habit-list"></div>
        <div class="w-footer-row">
          <span id="sync-time" class="w-sync-time"></span>
          <button class="wbtn w-sign-out-btn" id="sign-out-btn" type="button" title="로그아웃">⇱</button>
        </div>
      </div>

      <!-- Error view -->
      <div id="view-error" class="view view-center" style="display:none">
        <div class="w-err-icon">⚠️</div>
        <div class="w-err-msg" id="err-msg"></div>
        <button class="w-retry-btn" id="retry-btn" type="button">다시 시도</button>
      </div>

    </main>
  </div>

  <!-- Firebase compat SDK — same version as the main web app -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
