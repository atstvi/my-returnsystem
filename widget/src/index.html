<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Return Widget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The whole card is the widget surface. The top bar is the drag handle. -->
  <div class="widget-card">
    <!-- data-tauri-drag-region makes this strip move the window (frameless). -->
    <header class="widget-bar" data-tauri-drag-region>
      <span class="widget-title" data-tauri-drag-region>↩ Return</span>
      <div class="widget-controls">
        <button class="wbtn" id="pin-btn" type="button" title="항상 위에 고정">📌</button>
        <button class="wbtn" id="min-btn" type="button" title="최소화">—</button>
        <button class="wbtn wbtn-close" id="close-btn" type="button" title="닫기">×</button>
      </div>
    </header>

    <main class="widget-body">

      <!-- Loading splash -->
      <div id="view-loading" class="view view-center">
        <div class="w-spinner"></div>
        <div class="w-spinner-label">불러오는 중…</div>
      </div>

      <!-- Sign-in prompt -->
      <div id="view-auth" class="view view-center" style="display:none">
        <div class="w-logo">↩</div>
        <div class="w-auth-title">Return 위젯</div>
        <div class="w-auth-sub">Google 계정으로 로그인하면<br>오늘의 루틴을 볼 수 있어요.</div>
        <button class="w-sign-btn" id="sign-in-btn" type="button">Google로 로그인</button>
        <div class="w-auth-err" id="auth-err"></div>
      </div>

      <!-- Habit list (main view) -->
      <div id="view-habits" class="view view-col" style="display:none">
        <div class="w-date-row">
          <span id="today-label" class="w-date-label"></span>
          <span class="w-sync-dot" id="sync-dot"></span>
        </div>
        <div id="habit-list" class="habit-list"></div>
        <div class="w-footer-row">
          <span id="sync-time" class="w-sync-time"></span>
          <button class="wbtn w-sign-out-btn" id="sign-out-btn" type="button" title="로그아웃">⇱</button>
        </div>
      </div>

      <!-- Error view -->
      <div id="view-error" class="view view-center" style="display:none">
        <div class="w-err-icon">⚠️</div>
        <div class="w-err-msg" id="err-msg"></div>
        <button class="w-retry-btn" id="retry-btn" type="button">다시 시도</button>
      </div>

    </main>
  </div>

  <!-- Firebase compat SDK — same version as the main web app -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
